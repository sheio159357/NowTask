<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#6457e8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="NowTask" />
<meta name="description" content="判斷現在是否應該執行某個任務的行動決策系統" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
<title>NowTask 決策引擎</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-eyebrow">Action Decision System</div>
    <h1>NowTask 決策引擎</h1>
    <p>判斷現在是否應該執行某個任務。不是待辦清單，是行動決策系統。</p>
  </div>

  <div class="card">
    <div class="section-label">任務資訊</div>
    <div class="input-stack">
      <input type="text" id="task-title" placeholder="任務名稱（例：整理上週會議紀錄）" />
      <textarea id="task-desc" placeholder="任務描述（選填）"></textarea>
    </div>
  </div>

  <div class="card">
    <div class="section-label">當下狀態與任務參數</div>

    <div class="pill-group">
      <span class="pill-group-label">狀態模式</span>
      <div class="pill-row" data-group="mode">
        <button class="pill-btn active" data-val="focused">⚡ 專注</button>
        <button class="pill-btn" data-val="normal">🙂 一般</button>
        <button class="pill-btn" data-val="chill">😌 輕鬆</button>
        <button class="pill-btn" data-val="tired">😮‍💨 疲勞</button>
      </div>
    </div>

    <div class="pill-group">
      <span class="pill-group-label">時間壓力</span>
      <div class="pill-row" data-group="time">
        <button class="pill-btn" data-val="today">今天</button>
        <button class="pill-btn active" data-val="3days">3 天內</button>
        <button class="pill-btn" data-val="30days">30 天內</button>
        <button class="pill-btn" data-val="later">30 天以上</button>
      </div>
    </div>

    <div class="pill-group">
      <span class="pill-group-label">影響程度</span>
      <div class="pill-row" data-group="impact">
        <button class="pill-btn" data-val="high">高</button>
        <button class="pill-btn active" data-val="medium">中</button>
        <button class="pill-btn" data-val="low">低</button>
        <button class="pill-btn" data-val="minimal">極低</button>
      </div>
    </div>

    <div class="pill-group">
      <span class="pill-group-label">價值程度</span>
      <div class="pill-row" data-group="value">
        <button class="pill-btn" data-val="high">高</button>
        <button class="pill-btn active" data-val="medium">中</button>
        <button class="pill-btn" data-val="low">低</button>
        <button class="pill-btn" data-val="minimal">極低</button>
      </div>
    </div>

<div class="pill-group">
      <span class="pill-group-label">專注需求</span>
      <div class="pill-row" data-group="focus">
        <button class="pill-btn" data-val="high">高</button>
        <button class="pill-btn active" data-val="medium">中</button>
        <button class="pill-btn" data-val="low">低</button>
        <button class="pill-btn" data-val="minimal">極低</button>
      </div>
    </div>

    <div class="pill-group">
      <span class="pill-group-label">有替代任務？</span>
      <div class="pill-row" data-group="hasAlt">
        <button class="pill-btn active" data-val="no">沒有</button>
        <button class="pill-btn" data-val="yes">有</button>
      </div>
    </div>

    <div class="alt-row" id="alt-row" style="display:none;">
      <span>替代任務：</span>
      <input type="text" id="alt-task" placeholder="替代任務名稱" />
    </div>
  </div>

  <button class="submit-btn" id="decide-btn">判斷現在是否執行</button>

  <div id="error-area"></div>

  <div class="result-card" id="result-card">
    <div id="decision-badge" class="decision-badge">
      <span class="badge-dot"></span>
      <span id="badge-text">—</span>
    </div>
    <div class="score-row">
      <div class="score-track"><div class="score-fill" id="score-fill"></div></div>
      <div class="score-num" id="score-num">—</div>
    </div>
    <div class="result-section">
      <div class="result-lbl">判斷理由</div>
      <div class="result-val" id="reason-val">—</div>
    </div>
    <div class="result-section" id="suggestion-section" style="display:none;">
      <div class="divider"></div>
      <div class="result-lbl">建議行動</div>
      <div class="result-val" id="suggestion-val">—</div>
    </div>
    <div class="divider"></div>
    <div class="result-section">
      <div class="result-lbl">任務拆解</div>
      <div class="result-val" id="breakdown-val">—</div>
    </div>
  </div>

  <footer>NowTask Decision Engine · v1.0</footer>
</div>
<script src="./app.js"></script>
</body>
</html>
